<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{title}}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body class="login-bg">
<div class="login-wrapper">
    <div class="card login-card shadow-lg">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <div class="brand-logo mx-auto"></div>
                <h1 class="h3 mt-3 mb-1">Password dimenticata</h1>
                <p class="text-muted small mb-0">Step 1 di 2: identificazione</p>
            </div>
            {{alert}}
            <form method="post" action="/password">
                <div class="mb-3">
                    <label class="form-label">Email registrata</label>
                    <input type="email" name="email" class="form-control form-control-lg" value="{{email}}" required autofocus>
                </div>
                <button type="submit" class="btn btn-pmc w-100 btn-lg">Mostra domanda di sicurezza</button>
            </form>
            <hr class="my-4">
            <div class="text-center small">
                <a href="/login" class="text-decoration-none">Torna al login</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
