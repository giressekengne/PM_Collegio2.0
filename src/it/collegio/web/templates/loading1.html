<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{title}}</title>
    <meta http-equiv="refresh" content="3; url=/login">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body class="login-bg">

<div class="login-wrapper text-center">
    <div class="brand-logo mx-auto mb-4" style="width: 96px; height: 96px;"></div>
    <h1 class="h2 mb-2">PM Collegio</h1>
    <p class="text-muted mb-4">Inizializzazione in corso...</p>

    <div class="progress mx-auto" style="height: 8px; max-width: 340px;">
        <div class="progress-bar progress-pmc" role="progressbar"
             style="width: 0%; background: var(--pmc-primary);"></div>
    </div>
    <p class="text-muted small mt-3">Verrai indirizzato al login...</p>

    <noscript>
        <p class="mt-3"><a href="/login" class="btn btn-pmc">Procedi al login</a></p>
    </noscript>
</div>

<style>
    .progress-pmc {
        animation: pmcFill 2.6s ease forwards;
    }
    @keyframes pmcFill {
        from { width: 0%; }
        to   { width: 100%; }
    }
</style>

</body>
</html>
