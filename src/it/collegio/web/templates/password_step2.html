<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{title}}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body class="login-bg">
<div class="login-wrapper">
    <div class="card login-card shadow-lg">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <div class="brand-logo mx-auto"></div>
                <h1 class="h3 mt-3 mb-1">Password dimenticata</h1>
                <p class="text-muted small mb-0">Step 2 di 2: rispondi alla tua domanda di sicurezza</p>
            </div>
            {{alert}}
            <form method="post" action="/password">
                <input type="hidden" name="email" value="{{email}}">
                <input type="hidden" name="domanda" value="{{domanda}}">

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" value="{{email}}" disabled>
                </div>
                <div class="mb-3">
                    <label class="form-label">Domanda di sicurezza</label>
                    <input type="text" class="form-control bg-pmc-soft" value="{{domanda}}" disabled>
                </div>
                <div class="mb-3">
                    <label class="form-label">La tua risposta</label>
                    <input type="text" name="risposta" class="form-control" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label">Nuova password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-pmc w-100 btn-lg">Aggiorna password</button>
            </form>
            <hr class="my-4">
            <div class="text-center small">
                <a href="/login" class="text-decoration-none">Annulla</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
