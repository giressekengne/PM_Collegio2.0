<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{title}}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body class="login-bg">

<div class="login-wrapper" style="max-width: 720px;">
    <div class="card login-card shadow-lg">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <div class="brand-logo mx-auto"></div>
                <h1 class="h3 mt-3 mb-1">Registrazione</h1>
                <p class="text-muted small mb-0">Crea un account cliente. Sara' approvato da un amministratore.</p>
            </div>

            {{alert}}

            <form method="post" action="/registration" class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Nome *</label>
                    <input type="text" name="nome" class="form-control" value="{{nome}}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Cognome</label>
                    <input type="text" name="cognome" class="form-control" value="{{cognome}}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Email *</label>
                    <input type="email" name="email" class="form-control" value="{{email}}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Password *</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Telefono</label>
                    <input type="text" name="telefono" class="form-control" value="{{telefono}}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Genere</label>
                    <select name="genere" class="form-select">
                        <option value="MASCHIO">Maschio</option>
                        <option value="FEMMINA">Femmina</option>
                        <option value="ALTRO" selected>Altro</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Indirizzo (via)</label>
                    <select name="via" class="form-select">
                        {{viaOptions}}
                    </select>
                </div>
                <hr class="my-2">
                <div class="col-12">
                    <label class="form-label">Domanda di sicurezza</label>
                    <select name="domanda" class="form-select" required>
                        {{domandaOptions}}
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Risposta</label>
                    <input type="text" name="risposta" class="form-control" required>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-pmc btn-lg w-100 mt-2">Registrati</button>
                </div>
            </form>

            <hr class="my-4">
            <div class="text-center small">
                Hai gia' un account ? <a href="/login" class="text-decoration-none">Accedi</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
