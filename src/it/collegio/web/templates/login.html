<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{title}}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body class="login-bg">

<div class="login-wrapper">
    <div class="card login-card shadow-lg">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <div class="brand-logo mx-auto"></div>
                <h1 class="h3 mt-3 mb-1">PM Collegio</h1>
                <p class="text-muted small mb-0">Gestione prenotazioni collegi - v2 web</p>
            </div>

            {{error}}

            <form method="post" action="/login" novalidate>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control form-control-lg"
                           placeholder="nome.cognome@dominio.it" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control form-control-lg"
                           placeholder="********" required>
                </div>
                <button type="submit" class="btn btn-pmc w-100 btn-lg">Accedi</button>
            </form>

            <hr class="my-4">
            <div class="d-flex justify-content-between small">
                <a href="/registration" class="text-decoration-none">Registrazione</a>
                <a href="/password" class="text-decoration-none">Password dimenticata ?</a>
            </div>
        </div>
    </div>

</div>

</body>
</html>
