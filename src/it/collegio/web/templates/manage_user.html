<div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
    <div>
        <h1 class="h2 mb-1">Utenti</h1>
        <p class="text-muted mb-0">Totale: <strong>{{count}}</strong> &middot; {{filterNote}}</p>
    </div>
    <a href="/home" class="btn btn-outline-secondary">&larr; Home</a>
</div>

{{alert}}

<form method="get" action="/users" class="card shadow-sm border-0 mb-4">
    <div class="card-body p-3 d-flex gap-2 align-items-center">
        <label class="form-label mb-0 me-2">Cerca per email</label>
        <input type="email" name="searchEmail" class="form-control" placeholder="nome.cognome@dominio.it"
               value="{{searchValue}}" style="max-width: 360px;">
        <button class="btn btn-pmc">Cerca</button>
        <a href="/users" class="btn btn-outline-secondary">Pulisci</a>
    </div>
</form>

{{formBlock}}

<div class="card shadow-sm border-0">
    <div class="card-body p-0">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th>Counter</th>
                    <th>Nome</th>
                    <th>Cognome</th>
                    <th>Email</th>
                    <th>Telefono</th>
                    <th>Stato</th>
                    <th>Ruolo</th>
                    <th class="text-end">Azioni</th>
                </tr>
            </thead>
            <tbody>
                {{rows}}
            </tbody>
        </table>
    </div>
</div>
